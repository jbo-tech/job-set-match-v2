# Configuration métier unique — vault + LLM + serveur.
# Copier ce fichier en config.yaml et adapter les valeurs.
# Les secrets (API keys, AUTH_TOKEN) restent dans .env.

vault:
  vault_root: /path/to/obsidian/vault

  paths:
    applications: 03_Applications
    companies: 02_Companies
    archive: 03_Applications/_Archive_V1

  personal_docs:
    cv:
      path: 01_Profilage/Mon CV.md
      cache: true
    experiences:
      path: 01_Profilage/Experiences/[!_]*.md
      cache: true
    pitch:
      path: 01_Profilage/Mon Pitch.md
      cache: true
    profil:
      path: 01_Profilage/Profil Professionnel.md
      cache: true
    personnalite:
      path: 01_Profilage/Personnalite.md
      cache: true
    questions:
      path: 01_Profilage/Questions cles.md
      cache: false

  prompts: {}

llm:
  # Choix des modèles — le préfixe du model_id détermine le provider utilisé.
  # Préfixes supportés :
  #   claude-*           → Anthropic      (ex: claude-sonnet-4-20250514, claude-opus-4-20250514)
  #   gpt-*, o1-*, o3-*, o4-*, chatgpt-* → OpenAI (ex: gpt-4o, gpt-4o-mini, o4-mini)
  #   mistral*           → Mistral        (ex: mistral-large-latest, mistral-small-latest)
  #   deepseek*          → DeepSeek       (ex: deepseek-chat, deepseek-reasoner)
  #   groq/*             → Groq           (ex: groq/llama-3.1-70b-versatile)
  #   gemini*            → Google         (ex: gemini-2.5-flash, gemini-2.5-pro)
  # La clé API correspondante doit être renseignée dans .env (ex: OPENAI_API_KEY, MISTRAL_API_KEY…).
  # Chaque service peut être vide ("") → fallback sur le modèle "default".
  models:
    default: claude-sonnet-4-20250514
    analysis: ""
    company: ""
    generation: ""
    outreach: ""

  # Température par tâche (0.0 = déterministe → 1.0+ = créatif).
  #   analysis   — scoring de l'offre, on veut de la cohérence → basse
  #   generation — lettre de motivation, on veut du style → élevée
  #   outreach   — accroche LinkedIn / email, intermédiaire
  temperatures:
    analysis: 0.2
    generation: 0.7
    outreach: 0.5

  max_tokens: 8192
  # Outreach = sorties courtes (accroche + email) → budget tokens réduit.
  max_tokens_outreach: 4096

server:
  # Seuil du score chanceRating (1-10) à partir duquel la lettre de motivation
  # et l'outreach sont générés. 0.0 = toujours générer.
  score_threshold: 0.0
  host: 127.0.0.1
  port: 8000
